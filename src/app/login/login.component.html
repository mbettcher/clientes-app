<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg boder-0 rounded-lg mt-5">
                            <div class="card-header">
                                <h3 class="text-center font-weight-light my-4">
                                    {{novoUsuario ? 'Cadastrar novo usuário' : 'Entrar'}}
                                </h3>
                            </div>
                            <div class="card-body">
                                <div class="alert alert-danger" *ngIf="loginError">
                                    Login e/ou Senha incorreto(a).
                                </div>
                                <form #loginForm="ngForm" (submit)="onSubmit()">
                                    <div class="form-group">
                                        <label class="small mb-1">Login</label>
                                        <input class="form-control py-4" type="text" name="username" [(ngModel)]="username" placeholder="Digite seu login">
                                    </div>
                                    <div class="form-group">
                                        <label class="small mb-1">Senha</label>
                                        <input class="form-control py-4" type="password" name="password" [(ngModel)]="password" placeholder="Digite sua senha">
                                    </div>
                                    <div class="form-group align-items-center justify-content-between mt-4 mb-0">
                                        <button type="submit" class="btn btn-primary" *ngIf="!novoUsuario">
                                            Entrar
                                        </button>
                                        <button type="button" class="btn btn-success" *ngIf="novoUsuario">
                                            Cadastrar
                                        </button>
                                        <button type="button" class="btn btn-danger ml-1" *ngIf="novoUsuario" (click)="cancelarCadastro()">
                                            Cancelar
                                        </button>
                                    </div>
                                </form>
                            </div>
                            <div class="card-footer text-center">
                                <div class="small">
                                    <a href="#" (click)="prepararCadastro($event)">
                                        Não possui usuário? Cadastre-se aqui.    
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
