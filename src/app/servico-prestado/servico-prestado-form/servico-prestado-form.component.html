<h1 class="mt-4">Serviço Prestado</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-bitem active">Novo</li>
</ol>
<div class="container">
    <form #form="ngForm" (submit)="onSubmit()">

        <div class="row">
            <div class="col-md-12">
                <div class="alert alert-success" role="alert" *ngIf="mostrarMsgSucesso == true">
                    Serviço Salvo/Atualizado com sucesso!
                </div>
                <div class="alert alert-danger" role="alert" *ngFor="let erro of errors">
                    {{ erro }}
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-12">
                <div class="form-group">
                    <label>Cliente: </label>
                    <select class="form-control" 
                        [ngModelOptions]="{standalone:true}"
                        [(ngModel)]="servicoPrestado.idCliente">
                        <option value="">Selecione um cliente...</option>
                        <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">
                            {{ cliente.nome }}
                        </option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="form-group">
                    <label>Descrição: </label>
                    <input class="form-control" 
                        [(ngModel)]="servicoPrestado.descricao" 
                        type="text" 
                        name="descricao" 
                        id="inputDescricao">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label>Data: </label>
                    <input class="form-control" 
                        [(ngModel)]="servicoPrestado.data" 
                        type="data" 
                        name="data" 
                        id="inputData">
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <label>Valor: </label>
                    <input class="form-control" 
                        [(ngModel)]="servicoPrestado.preco" 
                        type="preco" 
                        name="preco" 
                        id="inputPreco">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-3">
                <button class="btn btn-primary" type="submit">
                    <i class="fa fa-save"></i> Salvar </button>
                
                <button class="btn btn-warning ml-1" routerLink="/servicos/lista" type="button">
                    <i class="fa fa-arrow-alt-circle-left"></i> Voltar </button>
            </div>
        </div>

    </form>
</div>
