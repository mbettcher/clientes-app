<h1 class="mt-4">Serviço Prestado</h1>
<ol class="breadcrumb mb-4">
    <li class="breadcrumb-bitem active">Consultar Serviço Prestado</li>
</ol>
<div class="container">
    <form #consultaForm="ngForm" (submit)="consultar()">
        <div class="row">
            <div class="col-md-6">
                <label for="inputNomeCliente">Nome do Cliente: </label>
                <input type="text" class="form-control" [(ngModel)]="nome" name="nomeCliente" id="inputNomeCliente">
            </div>
            <div class="col-md-6">
                <label for="inputMes">Mês: </label>
                <select name="mes" class="form-control" id="selectMes" [(ngModel)]="mes" >
                    <option value="">Selecione...</option>
                    <option *ngFor="let mes of meses" [value]="mes">
                        {{ mes }}
                    </option>
                </select>
            </div>
        </div>

        <br />

        <div class="row">
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary">
                    <i class="fa fa-search"></i> Consultar
                </button>

                <button type="button" routerLink="/servicos/form" class="btn btn-warning ml-1">
                    <i class="fa fa-plus"></i> Novo
                </button>
            </div>
        </div>
    </form>
    <br />
    <div class="row">
        <div class="alert alert-warning" role="alert" *ngIf="mensagem">
            {{ mensagem }}
        </div>
        <div class="col-md-12">
            <table class="table">
                <thead>
                    <th>Cliente</th>
                    <th>Descrição</th>
                    <th>Data</th>
                    <th>Valor</th>
                </thead>
                <tbody>
                    <tr *ngFor="let s of listaServicos">
                        <td>{{ s.cliente.nome }}</td>
                        <td>{{ s.descricao }}</td>
                        <td>{{ s.data }}</td>
                        <td>{{ s.valor }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
